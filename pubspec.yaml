name: mon_app
description: NurHealth — Application de santé islamique (نور الصحة)
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Interface
  cupertino_icons: ^1.0.8

  # Carte
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # GPS
  geolocator: 12.0.0

  # Liens externes
  url_launcher: ^6.3.1

  # Audio Quran
  just_audio: ^0.9.40

  # Stockage local
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  path: ^1.9.1

  # Sécurité PIN
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.4

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: 4.16.0
  cloud_firestore: ^4.17.5

  # Réseau
  http: ^1.6.0

  # Internationalisation
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true